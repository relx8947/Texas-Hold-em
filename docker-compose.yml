services:
  texas-holdem:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_PATH: "/data/data.db"
      STATIC_DIR: "/app/web"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    volumes:
      - texas_holdem_data:/data
    restart: unless-stopped

volumes:
  texas_holdem_data:
